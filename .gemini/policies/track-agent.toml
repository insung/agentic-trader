# .gemini/policies/track-agent.toml
# track-agent 전용 스킬 및 도구 실행 정책

[[rule]]
# track-agent는 'track-' 접두사가 붙은 전용 스킬들을 활성화할 수 있습니다.
toolName = "activate_skill"
subagent = "track-agent"
argsPattern = '.*"name":"track-.*".*'
decision = "allow"
priority = 100

[[rule]]
# track-agent가 아닌 다른 에이전트가 'track-' 스킬을 호출하려 하면 시스템이 차단합니다.
toolName = "activate_skill"
argsPattern = '.*"name":"track-.*".*'
decision = "deny"
priority = 50

[[rule]]
# track-agent가 수행하는 트랙 관리 파일들에 대한 쓰기 권한을 보장합니다.
toolName = "write_file"
subagent = "track-agent"
argsPattern = '.*"file_path":".*\.track/.*".*'
decision = "allow"
priority = 100
